<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EnerGlobix Home</title>
    <!-- Preload critical images -->
    <link rel="preload" href="assets/images/second-large.jpg" as="image" />
    <link rel="preload" href="assets/images/large-lux.jpg" as="image" />
    <link rel="preload" href="assets/images/development-logo.png" as="image" />
    <link rel="preload" href="assets/images/top-logo.png" as="image" />
    <!-- Prefetch holding page assets for instant navigation transition -->
    <link
      rel="prefetch"
      href="https://energlobixholding.kasehub.com/assets/Links/compressed-img/holding-hero.webp"
      as="image"
    />
    <link
      rel="prefetch"
      href="https://energlobixholding.kasehub.com/assets/Links/top-logo.png"
      as="image"
    />
    <!-- Bootstrap 5 CSS CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      @font-face {
        font-family: "Symbol Custom";
        src: url("assets/Document fonts/Symbol.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
      }

      body,
      html {
        height: 100vh;
        height: 100svh;
        width: 100%;
        margin: 0;
        font-family: "Symbol Custom", sans-serif;
        background-color: #000;
        position: relative;
        overflow: hidden;
      }

      .bg-layer-1 {
        background-image: url("assets/images/second-large.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        animation: crossfade-1 16s infinite ease-in-out;
      }
      .bg-layer-2 {
        background-image: url("assets/images/large-lux.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        animation: crossfade-2 16s infinite ease-in-out;
      }

      .hamburger-btn {
        background: none;
        border: none;
        color: #fff;
        padding: 0;
        cursor: pointer;
        pointer-events: auto;
        margin-top: 0.5rem; /* mt-2 */
        transition: color 0.15s ease-in-out;
      }

      .hamburger-btn:hover {
        color: #d1d5db; /* hover:text-gray-300 */
      }

      .hamburger-btn svg {
        width: 2rem; /* w-8 */
        height: 2rem; /* h-8 */
      }

      @keyframes crossfade-1 {
        0%,
        40%,
        100% {
          opacity: 1;
        }
        50%,
        90% {
          opacity: 0;
        }
      }
      @keyframes crossfade-2 {
        0%,
        40%,
        100% {
          opacity: 0;
        }
        50%,
        90% {
          opacity: 1;
        }
      }

      .overlay-main {
        background: rgba(0, 0, 0, 0.5);
        z-index: 10;
      }

      /* Custom Styles for high fidelity layout */
      .header-spacer {
        width: 2rem;
        height: 2rem;
      }

      .logo-main {
        height: 5rem;
        object-fit: contain;
      }

      .btn-hamburger {
        background: none;
        border: none;
        padding: 0;
        color: #fff;
        width: 2rem;
        height: 2rem;
        transition: color 0.3s ease;
      }

      .btn-hamburger:hover {
        color: #ccc;
      }

      .btn-hamburger svg {
        width: 100%;
        height: 100%;
      }

      .hover-scale {
        transition: transform 0.3s ease;
      }

      .hover-scale:hover {
        transform: scale(1.05);
      }

      .content-container {
        max-width: 896px; /* 4xl */
      }

      .hero-title {
        color: #fff;
        font-size: 1.25rem; /* text-xl */
        font-weight: 300; /* font-light */
        letter-spacing: 0.05em; /* tracking-wider */
        margin-bottom: 2rem; /* mb-8 */
        line-height: 1.625; /* leading-relaxed */
        max-width: 768px; /* max-w-3xl */
        filter: drop-shadow(0 10px 8px rgba(0, 0, 0, 0.4));
      }

      .btn-discover {
        /* border: 1px solid rgba(255, 255, 255, 0.2); */
        color: #c2b18f;
        background-color: #000;
        padding: 0.5rem 2rem; /* px-8 py-2 */
        letter-spacing: 0.25em; /* tracking-[0.25em] */
        font-size: 11px; /* text-[11px] */
        text-transform: uppercase;
        display: inline-block;
        font-weight: 500;
        transition: all 0.3s ease;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
        text-decoration: none;
      }

      .btn-discover:hover {
        background-color: #fff;
        color: #000;
        border-color: #fff;
      }

      .logo-holdings {
        height: 2.5rem; /* h-10 */
        object-fit: contain;
      }

      .text-holdings {
        color: #192d50;
        font-size: 0.75rem; /* text-xs */
        letter-spacing: 0.3em; /* tracking-[0.3em] */
        font-weight: 600; /* font-semibold */
        margin-top: 0.25rem; /* mt-1 */
      }

      .footnote {
        color: rgba(255, 255, 255, 0.5); /* text-white/50 */
        font-size: 9px; /* text-[9px] */
        letter-spacing: 0.25em; /* tracking-[0.25em] */
        text-transform: uppercase;
        font-weight: 300; /* font-light */
        margin-top: 1.5rem; /* mt-6 */
        text-align: center;
      }

      /* Responsive updates */
      @media (min-width: 768px) {
        .header-spacer {
          width: 2.5rem;
          height: 2.5rem;
        }
        .logo-main {
          height: 6.5rem; /* h-26 */
        }
        .btn-hamburger {
          width: 2.5rem;
          height: 2.5rem;
        }
        .hero-title {
          font-size: 1.875rem; /* text-3xl */
          margin-bottom: 2.5rem; /* mb-10 */
        }
        .btn-discover {
          padding: 0.625rem 2.5rem; /* px-10 py-2.5 */
          font-size: 12px; /* text-xs */
        }
        .logo-holdings {
          height: 3rem; /* h-12 */
        }
        .footnote {
          font-size: 0.75rem; /* text-xs */
        }
      }

      @media (min-width: 992px) {
        .hero-title {
          font-size: 2.25rem; /* text-4xl */
        }
      }

      /* Dropdown Navigation Menu */
      .nav-menu-container {
        position: absolute;
        top: calc(3.75rem + 10px);
        margin-top: 0;
        right: 0;
        left: 0;
        background-color: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 0.5rem;
        z-index: 100;
        display: flex;
        flex-direction: column;
        padding: 0.5rem 0;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-10px);
        transition: all 0.3s ease;
        pointer-events: none;
      }

      .nav-menu-container.active {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
        pointer-events: auto;
      }

      @media (min-width: 768px) {
        .nav-menu-container {
          width: 250px;
          right: 0;
          left: auto;
          top: calc(4.5rem + 10px);
          margin-top: 0;
        }
      }

      .nav-menu-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .nav-menu-item {
        margin: 0;
      }

      .nav-menu-link {
        color: #fff;
        font-size: 1rem;
        font-weight: 400;
        letter-spacing: 0.1em;
        text-decoration: none;
        text-transform: uppercase;
        display: block;
        padding: 1rem 1.5rem;
        text-align: center;
        transition: background-color 0.2s ease, color 0.2s ease;
      }

      @media (min-width: 768px) {
        .nav-menu-link {
          text-align: left;
        }
      }

      .nav-menu-link:hover {
        color: #c2b18f;
        background-color: rgba(255, 255, 255, 0.05);
      }
    </style>
  </head>
  <body>
    <!-- Background Layers for Crossfade Animation -->
    <div
      class="position-absolute top-0 start-0 w-100 h-100 z-0 pe-none overflow-hidden"
    >
      <div class="bg-layer-1 position-absolute top-0 start-0 w-100 h-100"></div>
      <div class="bg-layer-2 position-absolute top-0 start-0 w-100 h-100"></div>
    </div>

    <!-- Main Overlay Layout -->
    <div
      class="position-absolute top-0 start-0 w-100 h-100 overlay-main d-flex flex-column justify-content-between align-items-center py-5 px-3 py-md-5 px-md-5"
    >
      <!-- Top Header -->
      <div
        class="w-100 d-flex justify-content-between align-items-center pe-none position-relative"
      >
        <!-- Spacer to balance hamburger and center the logo -->
        <div class="header-spacer"></div>

        <!-- Center Logo -->
        <a
          href="https://energlobixholding.kasehub.com/"
          class="pe-auto hover-scale d-inline-block"
        >
          <img
            src="assets/images/development-logo.png"
            alt="EnerGlobix Development"
            class="logo-main"
          />
        </a>

        <!-- Hamburger Icon -->
        <button
          class="hamburger-btn"
          id="open-menu-btn"
          aria-label="Toggle navigation"
        >
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.5"
              d="M4 6h16M4 12h16M4 18h16"
            ></path>
          </svg>
        </button>

        <!-- Dropdown Menu -->
        <div class="nav-menu-container" id="nav-menu">
          <ul class="nav-menu-list">
            <li class="nav-menu-item">
              <a
                href="https://energlobixholding.kasehub.com/"
                class="nav-menu-link"
                >Holding</a
              >
            </li>
            <li class="nav-menu-item">
              <a
                href="https://energlobixdevelopment.kasehub.com/"
                class="nav-menu-link"
                >Development</a
              >
            </li>
          </ul>
        </div>
      </div>

      <!-- Center Content -->
      <div
        class="d-flex flex-column align-items-center justify-content-center text-center content-container px-3 my-auto pe-auto"
      >
        <h1 class="hero-title">
          EnerGlobix. Shaping global investment opportunities & communities
        </h1>
        <a
          href="https://energlobixdevelopment.kasehub.com/"
          class="btn-discover"
        >
          DISCOVER
        </a>
      </div>

      <!-- Footer Section -->
      <div class="w-100 d-flex flex-column align-items-center mt-auto pe-none">
        <!-- Holdings Logo (Middle Bottom) -->
        <a
          href="https://energlobixholding.kasehub.com/"
          class="d-flex flex-column align-items-center pe-auto hover-scale text-decoration-none"
        >
          <img
            src="assets/images/top-logo.png"
            alt="EnerGlobix Holdings"
            class="logo-holdings"
          />
          <div class="text-holdings">
            HOLDINGS
          </div>
        </a>

        <!-- Footnote Subtext -->
        <p class="footnote">
          ENERGLOBIX DEVELOPMENT - A PART OF ENERGLOBIX HOLDING
        </p>
      </div>
    </div>

    <script>
      // Menu Toggle Logic
      const openBtn = document.getElementById("open-menu-btn");
      const navMenu = document.getElementById("nav-menu");

      openBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        navMenu.classList.toggle("active");
      });

      // Close menu when clicking outside
      document.addEventListener("click", (e) => {
        if (
          navMenu &&
          !navMenu.contains(e.target) &&
          openBtn &&
          !openBtn.contains(e.target)
        ) {
          navMenu.classList.remove("active");
        }
      });
    </script>
  </body>
</html>
